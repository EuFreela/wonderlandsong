<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Wonderland Song — selo e universo musical: projetos, álbuns e histórias. Ajudando a construir música boa no Brasil e no mundo."
    />
    <meta name="theme-color" content="#05030a" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon-32.png" type="image/png" sizes="32x32" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="robots" content="index, follow" />
    <!-- Absolute canonical/OG URLs are set at runtime by Seo + VITE_SITE_URL (deploy host; no owned .com yet). -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Wonderland Song" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:title" content="Wonderland Song" />
    <meta
      property="og:description"
      content="Wonderland Song — selo e universo musical: projetos, álbuns e histórias. Ajudando a construir música boa no Brasil e no mundo."
    />
    <meta property="og:image" content="/images/wonderland2.webp" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Wonderland Song" />
    <meta
      name="twitter:description"
      content="Wonderland Song — selo e universo musical: projetos, álbuns e histórias."
    />
    <meta name="twitter:image" content="/images/wonderland2.webp" />
    <!-- Discover LCP poster early (before JS hydrates the parallax panel). -->
    <link
      rel="preload"
      as="image"
      href="/images/wonderland2-sm.webp"
      type="image/webp"
      media="(max-width: 900px)"
      fetchpriority="high"
    />
    <link
      rel="preload"
      as="image"
      href="/images/wonderland2.webp"
      type="image/webp"
      media="(min-width: 901px)"
      fetchpriority="high"
    />
    <title>Wonderland Song</title>
  </head>
  <body>
    <div id="root">
      <!-- Replaced by React on boot; shows while the app bundle loads. -->
      <div
        style="
          min-height: 100vh;
          min-width: 320px;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 1.25rem;
          background: #05030a;
          color: rgba(255, 255, 255, 0.45);
          font-family: Arial, Helvetica, sans-serif;
          font-size: 0.875rem;
        "
        role="status"
        aria-live="polite"
      >
        <img
          src="/boy.webp"
          alt=""
          width="140"
          height="140"
          aria-hidden="true"
          style="
            width: 8.75rem;
            height: 8.75rem;
            object-fit: contain;
            animation: boot-pulse 1.1s ease-in-out infinite;
            will-change: transform, opacity;
          "
        />
      </div>
    </div>
    <style>
      @keyframes boot-pulse {
        0%,
        100% {
          opacity: 0.45;
          transform: scale(0.9);
        }
        50% {
          opacity: 1;
          transform: scale(1.06);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #root img[src='/boy.webp'] {
          animation: none !important;
          opacity: 0.9 !important;
        }
      }
    </style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
